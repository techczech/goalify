interface:
  display_name: "Goalify"
  short_description: "Grill a project into a PRD and Codex /goal task."
  default_prompt: "Interview me thoroughly about this project before drafting anything final. Review the code and repo history, clarify key terms and concepts, ask one evidence-backed question at a time with your recommended answer, write a tight PRD/spec as a separate implementation-target document, put evidence and interview notes in a separate discovery-notes document, then give me a Codex /goal prompt in chat that references the PRD/spec path."
